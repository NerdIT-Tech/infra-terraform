name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch: {}

# Shared with terraform-pr.yml so a PR plan never reads the state cache
# while this workflow is mid-write.
concurrency:
  group: terraform-state
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"

jobs:
  # Identifies the merged PR (if any) behind this push, so `plan` can reuse
  # the exact tfplan that was reviewed on that PR instead of re-planning
  # post-merge. Direct pushes to main and workflow_dispatch runs have no
  # associated PR, so `plan` falls back to planning fresh for those.
  resolve-pr:
    name: Resolve merged PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr-number: ${{ steps.find.outputs.pr-number }}
    steps:
      - name: Find merged PR for this commit
        id: find
        uses: actions/github-script@v9
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const match = prs.find((pr) => pr.merged_at && pr.merge_commit_sha === context.sha);
            core.setOutput("pr-number", match ? String(match.number) : "");
            core.info(match
              ? `Reusing plan from PR #${match.number}`
              : "No merged PR matched this commit; planning fresh.");

  plan:
    name: Plan
    needs: resolve-pr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      GITHUB_APP_ID: ${{ vars.TF_GITHUB_APP_ID }}
      GITHUB_APP_INSTALLATION_ID: ${{ vars.TF_GITHUB_APP_INSTALLATION_ID }}
      GITHUB_APP_PEM_FILE: ${{ secrets.TF_GITHUB_APP_PEM }}
      SOURCE_PR: ${{ needs.resolve-pr.outputs.pr-number }}
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Cache miss on the very first run is expected: terraform starts
      # from an empty state and the first apply seeds the cache.
      - name: Restore state cache
        uses: actions/cache/restore@v6
        with:
          path: terraform.tfstate
          key: terraform-state-v1
          restore-keys: |
            terraform-state-

      - name: terraform init
        run: terraform init

      # Reuse path: this push is a merge of a PR whose terraform-pr.yml run
      # already produced a reviewed tfplan. Download it instead of
      # re-planning, so apply never runs anything that wasn't reviewed.
      - name: Download plan from merged PR
        if: env.SOURCE_PR != ''
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: terraform-pr.yml
          pr: ${{ env.SOURCE_PR }}
          name: tfplan
          workflow_conclusion: success

      # Fallback path: direct push to main or workflow_dispatch, with no
      # merged PR to source a plan from.
      - name: terraform plan (fresh)
        if: env.SOURCE_PR == ''
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Write plan to job summary
        run: |
          {
            if [ -n "$SOURCE_PR" ]; then
              echo "### Terraform Plan (reused from PR #${SOURCE_PR})";
            else
              echo "### Terraform Plan";
            fi
            echo '```';
            terraform show -no-color tfplan;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      # Handed to the apply job as artifacts rather than re-reading the
      # cache there, so apply always operates on exactly what was planned
      # and reviewed here — not on whatever the cache happens to hold by
      # the time a reviewer approves.
      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: tfplan
          retention-days: 5

      - name: Upload pre-apply state artifact
        uses: actions/upload-artifact@v7
        with:
          name: terraform-state-pre-apply
          path: terraform.tfstate
          retention-days: 90
          if-no-files-found: ignore

  apply:
    name: Apply
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      actions: write
    env:
      GITHUB_APP_ID: ${{ vars.TF_GITHUB_APP_ID }}
      GITHUB_APP_INSTALLATION_ID: ${{ vars.TF_GITHUB_APP_INSTALLATION_ID }}
      GITHUB_APP_PEM_FILE: ${{ secrets.TF_GITHUB_APP_PEM }}
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan

      - name: Download pre-apply state artifact
        uses: actions/download-artifact@v8
        with:
          name: terraform-state-pre-apply
        continue-on-error: true

      - name: terraform init
        run: terraform init

      - name: terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      # actions/cache never overwrites an existing key, so the previous
      # entry has to be deleted before the post-apply state can be saved
      # under the same fixed key. There is a brief window with no cache
      # entry between these two steps.
      - name: Delete stale state cache entry
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache delete terraform-state-v1 --repo "${{ github.repository }}" || true

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: terraform.tfstate
          key: terraform-state-v1

      # Durable backup independent of the cache, kept regardless of apply
      # outcome since terraform writes state incrementally as it applies.
      - name: Upload post-apply state artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-state-post-apply
          path: terraform.tfstate
          retention-days: 90
          if-no-files-found: ignore

  # The PR's sticky plan comment (from terraform-pr.yml) has now been
  # applied and is no longer useful — remove it rather than leave stale
  # plan output sitting on a closed PR.
  cleanup-pr-comment:
    name: Remove sticky plan comment
    needs: [resolve-pr, apply]
    if: needs.resolve-pr.outputs.pr-number != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Delete sticky plan comment
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr-number }}
        with:
          script: |
            const marker = "<!-- terraform-plan -->";
            const issue_number = Number(process.env.PR_NUMBER);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
