name: Terraform PR

on:
  pull_request:
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - ".tflint.hcl"
      - ".github/workflows/terraform-pr.yml"

# Shared with terraform-apply.yml so a PR plan never reads the state cache
# while an apply is mid-write.
concurrency:
  group: terraform-state
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"

jobs:
  validate:
    name: Format, validate, lint, scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive -diff

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: tflint init
        run: tflint --init

      - name: tflint
        run: tflint --recursive

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          # v0.70.0 (the action's own default) doesn't recognize that
          # github_repository_vulnerability_alerts satisfies GIT-0003 for
          # a linked github_repository -- only a later Trivy release does.
          version: v0.72.0

  plan:
    name: Plan
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      GITHUB_APP_ID: ${{ vars.TF_GITHUB_APP_ID }}
      GITHUB_APP_INSTALLATION_ID: ${{ vars.TF_GITHUB_APP_INSTALLATION_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Read-only: never saved back. If no cache exists yet, this is a
      # no-op and terraform starts from an empty state.
      - name: Restore state cache
        uses: actions/cache/restore@v6
        with:
          path: terraform.tfstate
          key: terraform-state-v1
          restore-keys: |
            terraform-state-

      - name: terraform init
        run: terraform init

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
        continue-on-error: true

      # Saved so a merge of this PR can apply exactly what was reviewed
      # here instead of re-planning after merge (see terraform-apply.yml).
      - name: Upload plan artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: tfplan
          retention-days: 5

      - name: Comment plan on PR
        uses: actions/github-script@v9
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const marker = "<!-- terraform-plan -->";
            const outcome = process.env.PLAN_OUTCOME;
            const output = process.env.PLAN_OUTPUT || "(no output captured)";
            const body = `${marker}\n### Terraform Plan (\`${outcome}\`)\n<details><summary>Show plan</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
